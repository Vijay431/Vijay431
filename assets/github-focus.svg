<svg width="820" height="250" viewBox="0 0 820 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vijay Gangatharan Portfolio Banner</title>
  <desc id="desc">Animated Cyberpunk banner for Vijay Gangatharan showing key developer focuses.</desc>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e15"/>
      <stop offset="50%" stop-color="#07090e"/>
      <stop offset="100%" stop-color="#0b132b"/>
    </linearGradient>
    
    <!-- Subtle Glow Filter -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes float-y {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-y-delayed {
        0% { transform: translateY(0px); }
        50% { transform: translateY(8px); }
        100% { transform: translateY(0px); }
      }
      @keyframes pulse-opacity {
        0% { opacity: 0.3; }
        50% { opacity: 0.75; }
        100% { opacity: 0.3; }
      }
      @keyframes text-color-glow {
        0% { fill: #f0f6fc; filter: drop-shadow(0 0 2px #ab47bc); }
        50% { fill: #ffffff; filter: drop-shadow(0 0 10px #00f2fe); }
        100% { fill: #f0f6fc; filter: drop-shadow(0 0 2px #ab47bc); }
      }
      @keyframes neon-border-pulse {
        0% { stroke: #ab47bc; }
        50% { stroke: #00f2fe; }
        100% { stroke: #ab47bc; }
      }
      
      .floating-card-1 {
        animation: float-y 5s ease-in-out infinite;
      }
      .floating-card-2 {
        animation: float-y-delayed 6s ease-in-out infinite;
      }
      .floating-card-3 {
        animation: float-y 5.5s ease-in-out infinite;
      }
      .floating-card-4 {
        animation: float-y-delayed 6.5s ease-in-out infinite;
      }
      .pulsing-grid {
        animation: pulse-opacity 5s ease-in-out infinite;
      }
      .title-glow {
        animation: text-color-glow 4s ease-in-out infinite;
      }
      .border-pulse {
        animation: neon-border-pulse 4s ease-in-out infinite;
      }
      .grid-line {
        stroke: #1f242c;
        stroke-width: 1;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="250" rx="20" fill="url(#bg-grad)"/>
  <rect x="1" y="1" width="818" height="248" rx="19" class="border-pulse" stroke="#ab47bc" stroke-width="1.5"/>

  <!-- Pulsing Tech Grid Background -->
  <g class="pulsing-grid">
    <!-- Horizontal Lines -->
    <line x1="0" y1="50" x2="820" y2="50" class="grid-line" />
    <line x1="0" y1="90" x2="820" y2="90" class="grid-line" />
    <line x1="0" y1="130" x2="820" y2="130" class="grid-line" />
    <line x1="0" y1="170" x2="820" y2="170" class="grid-line" />
    <line x1="0" y1="210" x2="820" y2="210" class="grid-line" />
    
    <!-- Vertical Lines -->
    <line x1="100" y1="0" x2="100" y2="250" class="grid-line" />
    <line x1="220" y1="0" x2="220" y2="250" class="grid-line" />
    <line x1="340" y1="0" x2="340" y2="250" class="grid-line" />
    <line x1="460" y1="0" x2="460" y2="250" class="grid-line" />
    <line x1="580" y1="0" x2="580" y2="250" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="250" class="grid-line" />
  </g>

  <!-- Window Dots -->
  <circle cx="25" cy="22" r="5" fill="#ff5f56" />
  <circle cx="43" cy="22" r="5" fill="#ffbd2e" />
  <circle cx="61" cy="22" r="5" fill="#27c93f" />
  <text x="410" y="27" text-anchor="middle" fill="#00f2fe" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="2">VIJAY.DEV // SYSTEM_ONLINE</text>

  <!-- Main Info -->
  <g transform="translate(0, 10)">
    <text x="410" y="75" text-anchor="middle" class="title-glow" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" letter-spacing="-0.5">VIJAY GANGATHARAN</text>
    <text x="410" y="102" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">Specialist Programmer @ Infosys | Fullstack Developer</text>
    <text x="410" y="122" text-anchor="middle" fill="#6e7681" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">AI DEVTOOLS • EXTENSIONS • WEB APP DEVELOPMENT</text>
  </g>

  <!-- Interactive/Floating Tech Category Cards -->
  <!-- Card 1: AI DevTools -->
  <g transform="translate(35, 165)">
    <g class="floating-card-1">
      <rect width="170" height="50" rx="10" fill="#161b22" stroke="#ab47bc" stroke-width="1.5" filter="url(#subtle-glow)"/>
      <text x="20" y="31" font-size="20">🤖</text>
      <text x="50" y="30" fill="#f0f6fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">AI DevTools</text>
    </g>
  </g>

  <!-- Card 2: VS Code APIs -->
  <g transform="translate(225, 165)">
    <g class="floating-card-2">
      <rect width="170" height="50" rx="10" fill="#161b22" stroke="#00f2fe" stroke-width="1.5" filter="url(#subtle-glow)"/>
      <text x="20" y="31" font-size="20">⚙️</text>
      <text x="50" y="30" fill="#f0f6fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">VS Code APIs</text>
    </g>
  </g>

  <!-- Card 3: Browser Exts -->
  <g transform="translate(415, 165)">
    <g class="floating-card-3">
      <rect width="180" height="50" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#subtle-glow)"/>
      <text x="20" y="31" font-size="20">🧩</text>
      <text x="50" y="30" fill="#f0f6fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Browser Exts</text>
    </g>
  </g>

  <!-- Card 4: Automation -->
  <g transform="translate(615, 165)">
    <g class="floating-card-4">
      <rect width="170" height="50" rx="10" fill="#161b22" stroke="#f2cc60" stroke-width="1.5" filter="url(#subtle-glow)"/>
      <text x="20" y="31" font-size="20">🚀</text>
      <text x="50" y="30" fill="#f0f6fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Automation</text>
    </g>
  </g>
</svg>
